include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/inventory-check.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'
      - '/ci-templates/vrt-upload.yml'

variables:
  SAST_EXCLUDED_PATHS: "build/, vauchi-core/"
  SECRET_DETECTION_EXCLUDED_PATHS: "build/, vauchi-core/"
  SAST_ANALYZER_IMAGE_TAG: "5"
  VAUCHI_CORE_REF: main

stages:
  - lint
  - deps
  - build
  - test
  - security
  - package
  - deploy

build:cabi:
  stage: deps
  script:
    - git clone --depth 1 --branch ${VAUCHI_CORE_REF}
        https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/core.git
        vauchi-core
    - cd vauchi-core
    - cargo build --release -p vauchi-cabi --features secure-storage
    - mkdir -p ${CI_PROJECT_DIR}/cabi-lib
    - cp target/release/libvauchi_cabi.so target/release/libvauchi_cabi.a ${CI_PROJECT_DIR}/cabi-lib/
  artifacts:
    paths:
      - cabi-lib/
  tags: [linux]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:qt:
  stage: build
  needs: [build:cabi]
  script:
    - mkdir -p build && cd build
    - cmake .. -DVAUCHI_CABI_DIR=${CI_PROJECT_DIR}/cabi-lib
    - cmake --build . --parallel
  artifacts:
    paths:
      - build/
  tags: [linux]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:unit:
  stage: test
  needs: [build:qt, build:cabi]
  variables:
    QT_QPA_PLATFORM: offscreen
  script:
    - cd build
    - ctest --output-on-failure
  tags: [linux]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# AT-SPI accessibility + widget tree tests
# Uses a venv with --system-site-packages so we can install pytest/Pillow
# while inheriting gi (PyGObject), a system-only package for AT-SPI.
.atspi-base:
  stage: test
  needs: [build:qt, build:cabi]
  tags: [linux, self-hosted]
  variables:
    QT_ACCESSIBILITY: "1"
    LD_LIBRARY_PATH: "${CI_PROJECT_DIR}/cabi-lib"
  before_script:
    - uv venv --system-site-packages .venv
    - source .venv/bin/activate
    - uv pip install --quiet -r tests/atspi/requirements.txt

test:a11y:
  extends: .atspi-base
  script:
    - tests/atspi/run-tests.sh -v --tb=short -k "not test_snapshots"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**"
          - "tests/atspi/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Visual snapshot regression — diffs against committed baselines.
test:snapshots:
  extends: .atspi-base
  variables:
    VRT_PLATFORM: linux-qt
    VRT_SCREENSHOT_DIR: tests/atspi/snapshots/baseline
  script:
    - tests/atspi/run-tests.sh -v --tb=short -k "test_snapshots"
  after_script:
    - !reference [.vrt-upload-script, script]
  artifacts:
    when: always
    paths:
      - tests/atspi/snapshots/baseline/
      - tests/atspi/snapshots/actual/
      - tests/atspi/snapshots/diff/
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**"
          - "tests/atspi/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Manual snapshot regeneration.
# Trigger: Pipelines → Run pipeline → REGENERATE_SNAPSHOTS=1
test:snapshots:record:
  extends: .atspi-base
  variables:
    UPDATE_SNAPSHOTS: "1"
  script:
    - tests/atspi/run-tests.sh -v --tb=short -k "test_snapshots"
  artifacts:
    when: always
    paths:
      - tests/atspi/snapshots/baseline/
    expire_in: 90 days
  rules:
    - if: $REGENERATE_SNAPSHOTS == "1"
      when: manual

# ============================================================
# Security Stage
# ============================================================

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.cpp"
          - "**/*.h"
          - "**/*.hpp"
          - "CMakeLists.txt"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "src/coreui/components"
    DESIGN_DRIFT_FILE_EXT: ".cpp"
    DESIGN_DRIFT_FILE_SUFFIX: "component"
    DESIGN_DRIFT_CASE: "lower"

# Inventory check: verify INVENTORY.md matches filesystem
check:inventory:
  extends: .inventory-check-job
  variables:
    COMPONENT_DIR: "src/coreui/components"
    COMPONENT_EXT: ".cpp"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "src/ tests/ design/ include/"

# ============================================================
# Package Stage — build-verification for distro packages
# ============================================================
# Only run on tags or manual trigger — not on every MR.

package:deb:
  stage: package
  image: debian:bookworm
  needs:
    - job: build:qt
      optional: true
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq devscripts debhelper cmake g++ pkg-config
        qt6-base-dev libqrencode-dev cargo rustc git
        qt6-multimedia-dev libzbar-dev qt6-connectivity-dev libpcsclite-dev
  script:
    - dpkg-buildpackage -us -uc -b
    - mkdir -p deb-out && cp ../*.deb deb-out/
  artifacts:
    paths:
      - deb-out/*.deb
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true

package:rpm:
  stage: package
  image: fedora:40
  needs:
    - job: build:qt
      optional: true
  before_script:
    - dnf install -y rpm-build cmake gcc-c++ pkg-config qt6-qtbase-devel
        qrencode-devel cargo rust git-core
        qt6-qtmultimedia-devel zbar-devel qt6-qtconnectivity-devel
        pcsc-lite-devel
  script:
    - mkdir -p rpmbuild/{SOURCES,SPECS}
    - tar czf rpmbuild/SOURCES/vauchi-qt-0.5.0.tar.gz
        --transform 's,^,vauchi-qt-0.5.0/,' --exclude=rpmbuild .
    - cp packaging/vauchi-qt.spec rpmbuild/SPECS/
    - rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/vauchi-qt.spec
    - mkdir -p rpm-out && cp rpmbuild/RPMS/**/*.rpm rpm-out/
  artifacts:
    paths:
      - rpm-out/*.rpm
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
