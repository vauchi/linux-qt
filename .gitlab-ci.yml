include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/inventory-check.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'

variables:
  SAST_EXCLUDED_PATHS: "build/, vauchi-core/"
  SECRET_DETECTION_EXCLUDED_PATHS: "build/, vauchi-core/"
  SAST_ANALYZER_IMAGE_TAG: "5"
  VAUCHI_CORE_REF: main

stages:
  - lint
  - deps
  - build
  - test
  - security
  - deploy

build:cabi:
  stage: deps
  script:
    - git clone --depth 1 --branch ${VAUCHI_CORE_REF}
        https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/core.git
        vauchi-core
    - cd vauchi-core
    - cargo build --release -p vauchi-cabi --features secure-storage
    - mkdir -p ${CI_PROJECT_DIR}/cabi-lib
    - cp target/release/libvauchi_cabi.so target/release/libvauchi_cabi.a ${CI_PROJECT_DIR}/cabi-lib/
  artifacts:
    paths:
      - cabi-lib/
  tags: [linux]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:qt:
  stage: build
  needs: [build:cabi]
  script:
    - mkdir -p build && cd build
    - cmake .. -DVAUCHI_CABI_DIR=${CI_PROJECT_DIR}/cabi-lib
    - cmake --build . --parallel
  artifacts:
    paths:
      - build/
  tags: [linux]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:unit:
  stage: test
  needs: [build:qt, build:cabi]
  variables:
    QT_QPA_PLATFORM: offscreen
  script:
    - cd build
    - ctest --output-on-failure
  tags: [linux]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# AT-SPI accessibility + widget tree tests
# Uses a venv with --system-site-packages so pip can install pytest/Pillow
# (PEP 668 blocks bare pip install on Arch) while inheriting gi (PyGObject)
# which is a system-only package needed for AT-SPI introspection.
test:a11y:
  stage: test
  needs: [build:qt, build:cabi]
  tags: [linux, self-hosted]
  variables:
    QT_ACCESSIBILITY: "1"
    LD_LIBRARY_PATH: "${CI_PROJECT_DIR}/cabi-lib"
  script:
    - python3 -m venv --system-site-packages .venv
    - source .venv/bin/activate
    - pip install --quiet -r tests/atspi/requirements.txt
    - tests/atspi/run-tests.sh -v --tb=short -k "not test_snapshots"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**"
          - "tests/atspi/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Visual snapshot regression — captures each screen under Xvfb and
# compares against committed baselines using ImageMagick compare.
# First run: generates baselines (skips, does not fail).
# Subsequent runs: diffs against baselines, fails on visual regression.
# Manual trigger: run with UPDATE_SNAPSHOTS=1 to regenerate baselines.
test:snapshots:
  stage: test
  needs: [build:qt, build:cabi]
  tags: [linux, self-hosted]
  variables:
    QT_ACCESSIBILITY: "1"
    LD_LIBRARY_PATH: "${CI_PROJECT_DIR}/cabi-lib"
  script:
    - python3 -m venv --system-site-packages .venv
    - source .venv/bin/activate
    - pip install --quiet -r tests/atspi/requirements.txt
    - tests/atspi/run-tests.sh -v --tb=short -k "test_snapshots"
  artifacts:
    when: always
    paths:
      - tests/atspi/snapshots/baseline/
      - tests/atspi/snapshots/actual/
      - tests/atspi/snapshots/diff/
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**"
          - "tests/atspi/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Manual snapshot regeneration — run this job to update baselines.
# Trigger via GitLab UI: Pipelines → Run pipeline → REGENERATE_SNAPSHOTS=1
test:snapshots:record:
  stage: test
  needs: [build:qt, build:cabi]
  tags: [linux, self-hosted]
  variables:
    QT_ACCESSIBILITY: "1"
    LD_LIBRARY_PATH: "${CI_PROJECT_DIR}/cabi-lib"
    UPDATE_SNAPSHOTS: "1"
  script:
    - python3 -m venv --system-site-packages .venv
    - source .venv/bin/activate
    - pip install --quiet -r tests/atspi/requirements.txt
    - tests/atspi/run-tests.sh -v --tb=short -k "test_snapshots"
  artifacts:
    when: always
    paths:
      - tests/atspi/snapshots/baseline/
    expire_in: 90 days
  rules:
    - if: $REGENERATE_SNAPSHOTS == "1"
      when: manual

# ============================================================
# Security Stage
# ============================================================

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.cpp"
          - "**/*.h"
          - "**/*.hpp"
          - "CMakeLists.txt"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "src/coreui/components"
    DESIGN_DRIFT_FILE_EXT: ".cpp"
    DESIGN_DRIFT_FILE_SUFFIX: "component"
    DESIGN_DRIFT_CASE: "lower"

# Inventory check: verify INVENTORY.md matches filesystem
check:inventory:
  extends: .inventory-check-job
  variables:
    COMPONENT_DIR: "src/coreui/components"
    COMPONENT_EXT: ".cpp"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "src/ tests/ design/ include/"

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
