include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/design-drift.yml'

stages:
  - lint
  - deps
  - build
  - test

variables:
  VAUCHI_CORE_REF: main

build:cabi:
  stage: deps
  script:
    - git clone --depth 1 --branch ${VAUCHI_CORE_REF}
        https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/core.git
        vauchi-core
    - cd vauchi-core
    - cargo build --release -p vauchi-cabi
    - mkdir -p ${CI_PROJECT_DIR}/cabi-lib
    - cp target/release/libvauchi_cabi.so target/release/libvauchi_cabi.a ${CI_PROJECT_DIR}/cabi-lib/
  artifacts:
    paths:
      - cabi-lib/
  tags: [linux]

build:
  stage: build
  needs: [build:cabi]
  script:
    - mkdir -p build && cd build
    - cmake .. -DVAUCHI_CABI_DIR=${CI_PROJECT_DIR}/cabi-lib
    - cmake --build . --parallel
  artifacts:
    paths:
      - build/vauchi-qt
  tags: [linux]

test:
  stage: test
  needs: [build]
  script:
    - cd build
    - ctest --output-on-failure
  tags: [linux]

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "src/coreui/components"
    DESIGN_DRIFT_FILE_EXT: ".cpp"
    DESIGN_DRIFT_FILE_SUFFIX: "component"
    DESIGN_DRIFT_CASE: "lower"
