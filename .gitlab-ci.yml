include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/badges.yml'

variables:
  SAST_EXCLUDED_PATHS: "build/, vauchi-core/"
  SECRET_DETECTION_EXCLUDED_PATHS: "build/, vauchi-core/"
  SAST_ANALYZER_IMAGE_TAG: "5"

stages:
  - lint
  - deps
  - build
  - test
  - security
  - deploy

variables:
  VAUCHI_CORE_REF: main

build:cabi:
  stage: deps
  script:
    - git clone --depth 1 --branch ${VAUCHI_CORE_REF}
        https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/core.git
        vauchi-core
    - cd vauchi-core
    - cargo build --release -p vauchi-cabi
    - mkdir -p ${CI_PROJECT_DIR}/cabi-lib
    - cp target/release/libvauchi_cabi.so target/release/libvauchi_cabi.a ${CI_PROJECT_DIR}/cabi-lib/
  artifacts:
    paths:
      - cabi-lib/
  tags: [linux]

build:
  stage: build
  needs: [build:cabi]
  script:
    - mkdir -p build && cd build
    - cmake .. -DVAUCHI_CABI_DIR=${CI_PROJECT_DIR}/cabi-lib
    - cmake --build . --parallel
  artifacts:
    paths:
      - build/vauchi-qt
  tags: [linux]

test:
  stage: test
  needs: [build]
  script:
    - cd build
    - ctest --output-on-failure
  tags: [linux]

# ============================================================
# Security Stage
# ============================================================

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.cpp"
          - "**/*.h"
          - "**/*.hpp"
          - "CMakeLists.txt"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "src/coreui/components"
    DESIGN_DRIFT_FILE_EXT: ".cpp"
    DESIGN_DRIFT_FILE_SUFFIX: "component"
    DESIGN_DRIFT_CASE: "lower"

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages
